<!DOCTYPE html>
<html>
<head>
  <title>Painel Admin - ArtenaShop</title>

  <style>
    body{
      font-family:Arial;
      background:#f5f5f5;
      margin:0;
      padding:20px;
    }

    h1{
      text-align:center;
    }

    .pedido{
      background:white;
      padding:15px;
      border-radius:12px;
      margin-bottom:10px;
      box-shadow:0 4px 10px rgba(0,0,0,0.1);
    }

    .btn{
      padding:8px;
      border:none;
      border-radius:6px;
      cursor:pointer;
      margin-top:5px;
    }

    .confirmar{background:#27ae60;color:white;}
    .entregue{background:#2980b9;color:white;}
    .cancelar{background:#e74c3c;color:white;}

    #logout{
      position:fixed;
      top:10px;
      right:10px;
      background:black;
      color:white;
      padding:10px;
    }
  </style>
</head>

<body>

<button id="logout" onclick="logout()">Sair</button>

<h1>📊 Painel Admin</h1>

<div id="lista"></div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import {
  getFirestore,
  collection,
  onSnapshot,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCjMXkLRne-AIP18eNYLy8rKSEAyXxkYGo",
  authDomain: "artenashop-971fa.firebaseapp.com",
  projectId: "artenashop-971fa",
  storageBucket: "artenashop-971fa.appspot.com",
  messagingSenderId: "103649440227",
  appId: "1:103649440227:web:26017341b0"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.updateDoc = updateDoc;
window.doc = doc;

// 🔐 PROTEÇÃO ADMIN
if(localStorage.getItem("admin") !== "ok"){
  window.location.href = "login.html";
}

// 🔥 TEMPO REAL
onSnapshot(collection(db, "pedidos"), (snapshot) => {
  let lista = document.getElementById("lista");
  lista.innerHTML = "";

  snapshot.forEach((docSnap) => {
    let p = docSnap.data();

    lista.innerHTML += `
    <div class="pedido">
      <b>👤 Cliente:</b> ${p.nome}<br><br>
      <b>📍 Endereço:</b> ${p.endereco}<br><br>
      <b>💰 Total:</b> ${p.total} Kz<br><br>
      <b>📅 Data:</b> ${p.data}<br><br>
      <b>📦 Status:</b> ${p.status || "pendente"}<br><br>

      <button class="btn confirmar" onclick="mudarStatus('${docSnap.id}','confirmado')">
        Confirmar
      </button>

      <button class="btn entregue" onclick="mudarStatus('${docSnap.id}','entregue')">
        Entregue
      </button>

      <button class="btn cancelar" onclick="mudarStatus('${docSnap.id}','cancelado')">
        Cancelar
      </button>
    </div>
    `;
  });
});

window.mudarStatus = async function(id, status){
  let ref = doc(db, "pedidos", id);
  await updateDoc(ref, { status: status });
}

window.logout = function(){
  localStorage.removeItem("admin");
  window.location.href = "login.html";
}
</script>

</body>
</html>

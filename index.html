<!DOCTYPE html>
<html>
<head>
  <title>ArtenaShop</title>

  <style>
    body{
      font-family: Arial;
      background:#f5f5f5;
      margin:0;
    }

    .produto{
      background:white;
      width:250px;
      margin:10px;
      padding:15px;
      border-radius:10px;
      box-shadow:0 5px 10px rgba(0,0,0,0.1);
      text-align:center;
      transition:0.3s;
    }

    .produto:hover{
      transform: translateY(-5px);
    }

    .produto img{
      width:100%;
      border-radius:10px;
    }

    .btn{
      background:#27ae60;
      color:white;
      padding:10px;
      border:none;
      border-radius:5px;
      cursor:pointer;
    }

    .btn:active{
      transform:scale(0.95);
    }

    .btn-limpar{
      background:#ff4d4d;
      color:white;
      padding:10px;
      border:none;
      border-radius:8px;
      margin-top:10px;
      width:100%;
    }

    #carrinho{
      position:fixed;
      top:0;
      right:-100%;
      width:300px;
      height:100%;
      background:white;
      box-shadow:-5px 0 15px rgba(0,0,0,0.3);
      padding:15px;
      transition:0.3s;
      z-index:999;
    }

    #botao-carrinho{
      position:fixed;
      top:10px;
      right:10px;
      background:#27ae60;
      color:white;
      border:none;
      padding:10px 15px;
      border-radius:20px;
      z-index:1000;
    }

    #finalizar-btn{
      position:fixed;
      bottom:20px;
      right:20px;
      background:#27ae60;
      color:white;
      padding:15px;
      border:none;
      border-radius:50px;
    }

    #formulario{
      display:none;
      position:fixed;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      background:white;
      padding:20px;
      border-radius:10px;
      box-shadow:0 4px 15px rgba(0,0,0,0.3);
      z-index:3000;
      width:250px;
      text-align:center;
    }

    #formulario input{
      width:100%;
      margin-bottom:10px;
      padding:10px;
    }

    .pedido{
      background:white;
      margin:10px;
      padding:10px;
      border-radius:10px;
    }
  </style>
</head>

<body>

<button id="botao-carrinho" onclick="abrirCarrinho()">
🛒 (<span id="contador">0</span>)
</button>

<div id="carrinho">
  <h2>🛒 Carrinho</h2>
  <button onclick="fecharCarrinho()">Fechar ❌</button>
  <hr>

  <div id="lista-carrinho"></div>

  <p><b>Total: <span id="total">0</span> Kz</b></p>

  <button class="btn-limpar" onclick="limparCarrinho()">🗑 Limpar Carrinho</button>
</div>

<div style="text-align:center; padding:20px;">
  <img src="8EA06E2D-D680-4B81-A5BE-98623B87500B.png" style="width:100px;">
  <h1>🛍️ ArtenaShop</h1>
</div>

<div style="display:flex; flex-wrap:wrap; justify-content:center;">

<!-- PRODUTOS -->
<script>
let produtos = [
["Perfume Premium",15000,"perfume.jpg"],
["Kit Cosmético",12000,"kit.jpg"],
["Fone Bluetooth",8000,"fone.jpg"],
["Creme Facial",7000,"creme.jpg"],
["Relógio Digital",20000,"relogio.jpg"],
["Chuteira Predator",9000,"chuteira.jpg"],
["Perfume Luxo",18000,"perfume.jpg"],
["Bolsa Feminina",14000,"bolsa.jpg"],
["Smartwatch",25000,"smartwatch.jpg"],
["Caixa de Som",11000,"caixa de som.jpg"]
];

document.write(produtos.map(p=>`
<div class="produto">
<img src="${p[2]}">
<h3>${p[0]}</h3>
<p><b>${p[1]} Kz</b></p>
<button class="btn" onclick="adicionar('${p[0]}',${p[1]})">
🛒 Adicionar ao carrinho
</button>
</div>
`).join(""));
</script>

</div>

<button id="finalizar-btn" onclick="finalizarPedido()">Finalizar 🛒</button>

<div id="formulario">
<h3>Finalizar Pedido</h3>
<input id="nome" placeholder="Seu nome">
<input id="endereco" placeholder="Seu endereço">
<button class="btn" onclick="enviarPedido()">Enviar</button>
</div>

<h2 style="padding:10px;">📊 Pedidos</h2>
<div id="lista-pedidos"></div>

<script>
let carrinho = [];

// salvar carrinho
function salvarCarrinho(){
  localStorage.setItem("carrinho", JSON.stringify(carrinho));
}

function carregarCarrinho(){
  let dados = localStorage.getItem("carrinho");
  if(dados){
    carrinho = JSON.parse(dados);
    atualizarCarrinho();
  }
}

// carrinho
function adicionar(nome, preco){
  carrinho.push({nome, preco});
  atualizarCarrinho();
  salvarCarrinho();
}

function remover(i){
  carrinho.splice(i,1);
  atualizarCarrinho();
  salvarCarrinho();
}

function limparCarrinho(){
  carrinho = [];
  atualizarCarrinho();
  salvarCarrinho();
}

function atualizarCarrinho(){
  let lista = document.getElementById("lista-carrinho");
  let total = document.getElementById("total");
  let contador = document.getElementById("contador");

  lista.innerHTML="";
  let soma=0;

  carrinho.forEach((item,i)=>{
    soma+=item.preco;

    lista.innerHTML+=`
    <div>
    ${item.nome} - ${item.preco} Kz
    <button onclick="remover(${i})">❌</button>
    </div>`;
  });

  total.innerText=soma;
  contador.innerText=carrinho.length;
}

// abrir fechar
function abrirCarrinho(){
  document.getElementById("carrinho").style.right="0";
}
function fecharCarrinho(){
  document.getElementById("carrinho").style.right="-100%";
}

// pedido
function finalizarPedido(){
  if(carrinho.length==0){
    alert("Carrinho vazio!");
    return;
  }
  document.getElementById("formulario").style.display="block";
}

function enviarPedido(){
  let nome=document.getElementById("nome").value;
  let endereco=document.getElementById("endereco").value;

  let total=0;
  let msg="🛒 *NOVO PEDIDO - ArtenaShop*\n\n";

  carrinho.forEach(item=>{
    msg+="• "+item.nome+" — "+item.preco+" Kz\n";
    total+=item.preco;
  });

  msg+="\n💰 Total: "+total+" Kz";
  msg+="\n👤 "+nome;
  msg+="\n📍 "+endereco;
  msg+= "\n📞 *Contacto:* 928363335";
  msg+= "\n\n📌 *Observação:* Entraremos em contacto em breve.";

  window.open("https://wa.me/244928363335?text="+encodeURIComponent(msg));

  // guardar pedidos
  let pedidos=JSON.parse(localStorage.getItem("pedidos"))||[];
  pedidos.push({nome,total,data:new Date().toLocaleString()});
  localStorage.setItem("pedidos",JSON.stringify(pedidos));

  carrinho=[];
  atualizarCarrinho();
  salvarCarrinho();
  document.getElementById("formulario").style.display="none";

  carregarPedidos();
}

// dashboard
function carregarPedidos(){
  let pedidos=JSON.parse(localStorage.getItem("pedidos"))||[];
  let lista=document.getElementById("lista-pedidos");

  lista.innerHTML="";

  pedidos.forEach(p=>{
    lista.innerHTML+=`
    <div class="pedido">
    Cliente: ${p.nome}<br>
    Total: ${p.total} Kz<br>
    Data: ${p.data}
    </div>`;
  });
}

// iniciar
carregarCarrinho();
carregarPedidos();

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>ArtenaShop</title>

  <style>
    body{font-family:Arial;background:#f5f5f5;margin:0;}

    .produto{
      background:white;width:250px;margin:10px;padding:15px;
      border-radius:10px;box-shadow:0 5px 10px rgba(0,0,0,0.1);
      text-align:center;
    }

    .produto img{width:100%;border-radius:10px;}

    .btn{
      background:#27ae60;color:white;padding:10px;
      border:none;border-radius:5px;cursor:pointer;
    }

    #carrinho{
      position:fixed;top:0;right:-100%;
      width:300px;height:100%;background:white;
      padding:15px;transition:0.3s;
    }

    #botao-carrinho{
      position:fixed;top:10px;right:10px;
      background:#27ae60;color:white;border:none;
      padding:10px;border-radius:20px;
    }

    #finalizar-btn{
      position:fixed;bottom:20px;right:20px;
      background:#27ae60;color:white;padding:15px;
      border:none;border-radius:50px;
    }

    #formulario{
      display:none;position:fixed;top:50%;left:50%;
      transform:translate(-50%,-50%);
      background:white;padding:20px;border-radius:10px;
    }
  </style>
</head>

<body>

<button id="botao-carrinho" onclick="abrirCarrinho()">
🛒 (<span id="contador">0</span>)
</button>

<div id="carrinho">
  <h2>🛒 Carrinho</h2>
  <button onclick="fecharCarrinho()">Fechar</button>
  <hr>
  <div id="lista-carrinho"></div>
  <p><b>Total: <span id="total">0</span> Kz</b></p>
</div>

<div style="text-align:center;padding:20px;">
<h1>🛍️ ArtenaShop</h1>
</div>

<div style="display:flex;flex-wrap:wrap;justify-content:center;" id="produtos"></div>

<button id="finalizar-btn" onclick="finalizarPedido()">Finalizar</button>

<div id="formulario">
<h3>Finalizar Pedido</h3>
<input id="nome" placeholder="Nome"><br><br>
<input id="endereco" placeholder="Endereço"><br><br>
<button class="btn" onclick="enviarPedido()">Enviar</button>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCjMXkLRne-AIP18eNYLy8rKSEAyXxkYGo",
  authDomain: "artenashop-971fa.firebaseapp.com",
  projectId: "artenashop-971fa",
  storageBucket: "artenashop-971fa.appspot.com",
  messagingSenderId: "103649440227",
  appId: "1:103649440227:web:26017341b0"
};

const app = initializeApp(firebaseConfig);
window.db = getFirestore(app);
window.addDoc = addDoc;
window.collection = collection;
</script>

<script>
let carrinho=[];

let produtos=[
["Perfume Premium",15000],
["Kit Cosmético",12000],
["Fone Bluetooth",8000],
["Creme Facial",7000],
["Relógio Digital",20000],
["Chuteira Predator",9000]
];

document.getElementById("produtos").innerHTML =
produtos.map(p=>`
<div class="produto">
<h3>${p[0]}</h3>
<p>${p[1]} Kz</p>
<button class="btn" onclick="add('${p[0]}',${p[1]})">
Adicionar
</button>
</div>`).join("");

function add(nome,preco){
  carrinho.push({nome,preco});
  atualizar();
}

function atualizar(){
  let lista=document.getElementById("lista-carrinho");
  let total=0;
  lista.innerHTML="";

  carrinho.forEach((i,index)=>{
    total+=i.preco;
    lista.innerHTML+=`${i.nome} - ${i.preco} 
    <button onclick="remover(${index})">x</button><br>`;
  });

  document.getElementById("total").innerText=total;
  document.getElementById("contador").innerText=carrinho.length;
}

function remover(i){
  carrinho.splice(i,1);
  atualizar();
}

function abrirCarrinho(){document.getElementById("carrinho").style.right="0";}
function fecharCarrinho(){document.getElementById("carrinho").style.right="-100%";}

function finalizarPedido(){
  if(carrinho.length==0)return alert("Carrinho vazio");
  document.getElementById("formulario").style.display="block";
}

function enviarPedido(){
  let nome=document.getElementById("nome").value;
  let endereco=document.getElementById("endereco").value;

  let total=0;
  let texto="🛒 *NOVO PEDIDO - ArtenaShop*\n━━━━━━━━━━━━━━━\n";

  carrinho.forEach(i=>{
    texto+=`• ${i.nome} — ${i.preco} Kz\n`;
    total+=i.preco;
  });

  texto+=`━━━━━━━━━━━━━━━\n💰 Total: ${total} Kz\n\n`;
  texto+=`👤 Cliente: ${nome}\n📍 Endereço: ${endereco}\n\n`;
  texto+=`🚀 Obrigado!\n📞 928363335`;

  // WhatsApp
  window.open("https://wa.me/244928363335?text="+encodeURIComponent(texto));

  // Firebase
  addDoc(collection(db,"pedidos"),{
    nome,
    endereco,
    total,
    status:"pendente",
    data:new Date().toLocaleString()
  });

  carrinho=[];
  atualizar();
  document.getElementById("formulario").style.display="none";
}
</script>

</body>
</html>
